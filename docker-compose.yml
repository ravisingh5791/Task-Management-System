version: '3.9'
services:
  mongodb:
    image: mongo:8
    container_name: taskflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/task_management_db
      JWT_SECRET: change_this_secret
      NODE_ENV: production
      FRONTEND_URL: http://localhost:8080
    depends_on:
      - mongodb
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data: